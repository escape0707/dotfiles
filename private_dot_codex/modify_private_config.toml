{{- /* chezmoi:modify-template */ -}}
{{- $isTermux := eq .chezmoi.os "android" -}}
{{- $isLinux := eq .chezmoi.os "linux" -}}
{{- $isWindows := eq .chezmoi.os "windows" -}}
{{- $windowsLocalAppData := "" -}}
{{- $windowsRoamingAppData := "" -}}
{{- if $isWindows -}}
{{-   $windowsLocalAppData = env "LOCALAPPDATA" -}}
{{-   $windowsRoamingAppData = env "APPDATA" -}}
{{- end -}}
{{- $workspacesDir := printf "%s%sworkspaces" .chezmoi.homeDir .chezmoi.pathSeparator -}}
{{- $marker := "# Codex app/CLI generated config may be appended below this line." -}}
{{- $tail := "" -}}
{{- $parts := splitList $marker .chezmoi.stdin -}}
{{- if gt (len $parts) 1 -}}
{{-   $tail = (index $parts 1 | trim) -}}
{{- end -}}
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
web_search = "live"
{{- if $isTermux }}
sandbox_mode = "danger-full-access"
{{- else }}
sandbox_mode = "workspace-write"
{{- end }}
approvals_reviewer = "user"
check_for_update_on_startup = false
plan_mode_reasoning_effort = "xhigh"

[sandbox_workspace_write]
network_access = true
{{- if not $isTermux }}
writable_roots = [
    '{{ .chezmoi.sourceDir }}',
{{- if $isWindows }}
    '{{ $windowsLocalAppData }}\fnm_multishells',
    '{{ $windowsLocalAppData }}\ms-playwright',
    '{{ $windowsLocalAppData }}\pnpm',
    '{{ $windowsLocalAppData }}\pnpm-cache',
    '{{ $windowsLocalAppData }}\uv\cache',
    '{{ $windowsRoamingAppData }}\fnm',
    '{{ $windowsRoamingAppData }}\uv\python',
{{- else if $isLinux }}
    "~/.cache/ccache",
    "~/.cache/chromium",
    "~/.cache/gh",
    "~/.cache/go-build",
    "~/.cache/ms-playwright",
    "~/.cache/pnpm",
    "~/.cache/uv",
    "~/.config/chromium",
    "~/.config/gws",
    "~/.local/share/cargo",
    "~/.local/share/pnpm",
    "~/.local/share/uv/python",
    "~/.npm/_cacache/tmp",
    "~/.texlive/texmf-var",
    "~/go",
{{- end }}
]
{{- end }}

{{- if $isWindows }}
[windows]
sandbox = "elevated"
{{- end }}

[tui]
{{- if $isTermux }}
status_line = ["model-with-reasoning", "context-remaining", "weekly-limit"]
{{- else }}
status_line = ["model-with-reasoning", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit", "git-branch", "current-dir"]
{{- end }}
session_picker_view = "comfortable"
{{- if $isTermux }}
notification_method = "bel"
{{- end }}
notification_condition = "always"
status_line_use_colors = true

{{ $marker }}
{{- if $tail }}
{{ $tail }}
{{- end }}
